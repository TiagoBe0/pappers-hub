<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resúmenes de Pappers</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body>
    <div class="bg-grid" aria-hidden="true"></div>
    <main class="concept-map" aria-live="polite">
      <h1 class="center-node">Resúmenes</h1>
      <p class="subtitle">Mapa editorial de pappers resumidos por IA</p>
      <p class="helper" id="status">Buscando pappers en <code>pappers_html/</code>…</p>
      <section id="mapNodes" class="node-ring" aria-label="Enlaces a pappers"></section>
    </main>

    <template id="paperNodeTemplate">
      <a class="paper-node" target="_self" rel="noopener noreferrer">
        <span class="paper-card-kicker">Resumen</span>
        <span class="paper-id"></span>
        <span class="paper-summary"></span>
        <span class="paper-card-action">Leer paper</span>
      </a>
    </template>

    <div class="zoom-overlay" id="zoomOverlay" role="dialog" aria-modal="true" aria-labelledby="zoomTitle">
      <article class="zoom-card">
        <button class="zoom-close" id="zoomClose" aria-label="Cerrar">✕</button>
        <span class="paper-card-kicker">Paper · Resumen</span>
        <h2 class="zoom-title" id="zoomTitle"></h2>
        <p class="zoom-body" id="zoomBody"></p>
        <a class="zoom-link" id="zoomLink" href="#">Leer artículo completo →</a>
      </article>
    </div>

    <script src="assets/app.js" defer></script>
  </body>
</html>
